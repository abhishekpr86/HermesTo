    OPEL:
            subject: PSA OPEL Welcome email – please read carefully
            body: <div><font face=Calibri,sans-serif> <span style=font-size:11pt><font color=#1F497D></font>Hi ~firstName~, <br/><br/><b>Welcome to Opel. Hope you will have a great time working with us. Welcome aboard new buddy!</b><br/><br/>You will find below useful link to access <b>various templates which will enable you to track the KT sessions</b>, as well as tools used on Opel and procedures to follow. Please read it carefully and contact your direct manager if you have any questions.<br/><br/><a href=https://e-3d-jira.capgemini.com/confluence/display/HERK/Problem+Solver>KT-Kit Link </a><br/><br/>Also, do not hesitate to contact the PMO / Domain Service Delivery Leads who will be pleased to help you as much as s/he can:<br/><br/><ul><li>PMO - Vidya Joshi</li><li>Manufacturing & SC Domain SDM - Manish Lokhande</li><li>Engineering Domain SDM - Chhaya Shinde</li><li>Sales & After sales Domain SDM - Kartik Iyer</li></ul><br/>You also need to complete the below mandatory trainings.  Please connect with your PMO in case of any doubts.<br/><br/><ol><li>ITIL Training</li><li>CHROME training</li><li>Process Training</li><li>Transition kick off session - Classroom Training (happens once a month</li></ol><br/>You also need to ensure if the below is in place in order to take delivery commitments.<br/><ol><li>Sharepoint access for all 3 entities GM, OV, CG - Please send an email to vidya.joshi@capgemini.com</li><li>Sharepoint access for Opel and CG - Please send an email to vidya.joshi@capgemini.com</li><li>GM ID creation - Please send an email to vidya.joshi@capgemini.com with the details of your DOB. <a href=http://sp2013-intern.ce.capgemini.com/CGD/Auto/OpelPSA/GMOV/Shared Documents/On Boarding Documents/User guide for activating the GMID.pptx>Please activate the GM ID within 1 week from the day you get the ID</a></li><li>Laptop Request - Please raise a request in India Service Desk.</li><li><a href=http://sp2013-intern.ce.capgemini.com/CGD/Auto/OpelPSA/GMOV/Shared Documents/On Boarding Documents/OV Acceleration Network connectivity v1.0.docx>Remote desktop connectivity</a></li><li><a href=http://sp2013-intern.ce.capgemini.com/CGD/Auto/OpelPSA/GMOV/Shared Documents/On Boarding Documents/ITSM_Access and update user role.docx> Access to ITSM - Request to be raised in IT catalogue.</a></li><li>Adding name to the Opel DLs - Ensure your name is added in respective DL as per your Domain. Please write to vidya.joshi@capgemini.com</li></ol><br/><br/>Thanks & regards,<br/>Opel PMO team<br/><br/></div>
            from: hermes